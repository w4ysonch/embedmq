name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-latest ]
        compiler: [ gcc, clang ]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y cmake

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=${{ matrix.compiler }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test (C)
        run: ./build/test_embedmq

      - name: Test (C++ wrapper)
        run: ./build/test_embedmq_cpp

  freertos-sim:
    name: FreeRTOS PAL (POSIX simulator)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y cmake

      - name: Configure (fetches FreeRTOS-Kernel)
        run: cmake -B build-frt -DEMBEDMQ_BUILD_FREERTOS_SIM=ON

      - name: Build
        run: cmake --build build-frt --parallel

      - name: Run simulator test
        run: ./build-frt/sim/freertos/test_embedmq_freertos
